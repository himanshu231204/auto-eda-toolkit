# Docker Compose file for Auto EDA Toolkit

version: '3.8'

services:
  # Main application service
  auto-eda:
    build: .
    container_name: auto-eda-toolkit
    ports:
      - "8501:8501"  # Streamlit port
      - "8888:8888"  # Jupyter port
    volumes:
      - ./examples:/app/examples
      - ./outputs:/app/outputs
      - ./data:/app/data  # Mount your local data directory
    environment:
      - PYTHONUNBUFFERED=1
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    
  # Jupyter notebook service (optional)
  jupyter:
    build: .
    container_name: auto-eda-jupyter
    ports:
      - "8889:8888"
    volumes:
      - ./:/app
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''
    
# To use:
# docker-compose up auto-eda       # Run Streamlit app
# docker-compose up jupyter        # Run Jupyter notebook
# docker-compose up                # Run both
